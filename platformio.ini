; PlatformIO Project Configuration File
;
;   ARES - Amateur Rocket Embedded System
;   Board: ESP32-S3 Zero Mini
;

[platformio]
default_envs = esp32-s3-devkitc-1

; ── Shared ESP32 settings ────────────────────────────────────
[esp32_base]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
build_flags =
    -Wall
    -Wextra
    -Werror
    -Wdouble-promotion
    -fno-exceptions
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARES_LOG_LEVEL=4
    -DCONFIG_FREERTOS_CHECK_STACKOVERFLOW=2
    -DCONFIG_ESP_TASK_WDT_EN=1
    -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=5
    -DCONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU0=1
    -DCONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU1=1
    -DCONFIG_ESP_TASK_WDT_PANIC=1
build_src_flags = -fno-rtti
build_unflags = -std=gnu++11
lib_deps =
    bblanchon/ArduinoJson@^7.0
test_build_project_src = true
test_ignore = test_radio_protocol

; ── ESP32-S3 Zero Mini ────────────────────────────
[env:esp32-s3-devkitc-1]
extends = esp32_base
board = esp32-s3-devkitc-1

; ── Native (protocol unit tests) ──────────────────
[env:native]
platform = native
build_flags =
    -std=c++17
    -I src
build_src_filter =
    -<*>
    +<comms/>
test_filter = test_radio_protocol
