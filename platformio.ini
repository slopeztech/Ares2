; PlatformIO Project Configuration File
;
;   ARES - Amateur Rocket Embedded System
;   Board: ESP32-S3 Zero Mini
;

[platformio]
default_envs = esp32-s3-devkitc-1

; ── Shared ESP32 settings ────────────────────────────────────
[esp32_base]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
build_flags =
    -Wall
    -Wextra
    -Werror
    -Wdouble-promotion
    -fno-exceptions
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARES_LOG_LEVEL=4
    -DCONFIG_FREERTOS_CHECK_STACKOVERFLOW=2
    -DCONFIG_ESP_TASK_WDT_EN=1
    -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=5
    -DCONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU0=1
    -DCONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU1=1
    -DCONFIG_ESP_TASK_WDT_PANIC=1
build_src_flags = -fno-rtti
build_unflags = -std=gnu++11
lib_deps =
    bblanchon/ArduinoJson@^7.0
test_build_project_src = true
test_ignore = test_radio_protocol

; ── ESP32-S3 Zero Mini ────────────────────────────
[env:esp32-s3-devkitc-1]
extends = esp32_base
board = esp32-s3-devkitc-1

; ── Native (protocol unit tests) ──────────────────
[env:native]
platform = native
build_flags =
    -std=c++17
    -I src
    -I src/ams
    -I src/comms
    -I src/debug
    -I test/stubs
build_src_filter =
    -<*>
    +<comms/ares_radio_protocol.cpp>
    +<debug/ares_log.cpp>
test_build_src = true
test_filter =
    test_radio_protocol
    test_ams_helpers
    test_api_handlers

; ── SITL (Software-In-The-Loop integration tests) ──
[env:sim]
platform = native
build_flags =
    -std=c++17
    -I src
    -I src/ams
    -I src/comms
    -I src/debug
    -I src/hal/gps
    -I src/hal/baro
    -I src/hal/imu
    -I src/hal/radio
    -I src/hal/storage
    -I src/hal/pulse
    -I test/stubs
    -I test/stubs/freertos
    -I test/stubs/hal_sim
    -DARES_NDEBUG
    -DARES_SITL
build_src_filter =
    -<*>
    +<ams/mission_script_engine.cpp>
    +<ams/mission_script_engine_runtime.cpp>
    +<ams/mission_script_engine_checkpoint.cpp>
    +<ams/mission_script_engine_actions.cpp>
    +<ams/mission_script_engine_parser.cpp>
    +<ams/mission_script_engine_parser_meta.cpp>
    +<ams/mission_script_engine_parser_state.cpp>
    +<ams/mission_script_engine_parser_cond.cpp>
    +<ams/mission_script_engine_parser_actions.cpp>
    +<ams/mission_script_engine_parser_finalize.cpp>
    +<ams/mission_script_engine_sensor.cpp>
    +<ams/mission_script_engine_telemetry.cpp>
    +<ams/mission_script_engine_utils.cpp>
    +<comms/ares_radio_protocol.cpp>
    +<comms/radio_dispatcher.cpp>
    +<debug/ares_log.cpp>
test_build_src = true
test_filter =
    test_ams_helpers
    test_ams_integration
    test_ams_parser
    test_api_handlers
    test_dispatcher
    test_radio_protocol

; ── Coverage (gcov) ────────────────────────────────
[env:coverage]
platform = native
build_flags =
    -std=c++17
    -I src
    -I src/ams
    -I src/comms
    -I src/debug
    -I test/stubs
    -fprofile-arcs
    -ftest-coverage
    -O0
    -lgcov
build_src_filter =
    -<*>
    +<comms/ares_radio_protocol.cpp>
    +<debug/ares_log.cpp>
test_build_src = true
test_filter =
    test_radio_protocol
    test_ams_helpers
